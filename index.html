<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW２.５ダイスローラー</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --border-color: #334155;
            --accent: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* justify-content: center; */
            /* モバイルでコンテンツが画面外に押し出される原因となるため削除 */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--surface-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .control-btn {
            background-color: var(--border-color);
            color: var(--text-color);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background-color: var(--primary);
            transform: scale(1.1);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            background-color: var(--border-color);
        }

        .dice-count-display {
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 80px;
            background: var(--bg-color);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .roll-btn-container {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .roll-btn {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            flex: 2;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .fate-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            flex: 1;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .fate-btn:disabled {
            background: #4b5563;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .roll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .roll-btn:active {
            transform: translateY(1px);
        }

        .results-area {
            margin-top: 40px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Webhook設定用のスタイル */
        .setting-section {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        .setting-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pc-name-container {
            margin-bottom: 20px;
            width: 100%;
        }

        .pc-name-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .pc-name-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .webhook-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .webhook-url-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        .webhook-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .dice-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .die {
            width: 60px;
            height: 60px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: scale(0.5) rotate(180deg);
        }

        .die.show {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .die.rolling {
            animation: shake 0.4s infinite;
        }

        @keyframes shake {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(15deg);
            }

            50% {
                transform: rotate(0deg);
            }

            75% {
                transform: rotate(-15deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .total-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .total-score.show {
            animation: slideUp 0.6s ease forwards;
            animation-delay: 0.2s;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history {
            margin-top: 30px;
            width: 100%;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            text-align: left;
            font-size: 0.9rem;
            color: #94a3b8;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }

        /* Scrollbar styles for history */
        .history::-webkit-scrollbar {
            width: 6px;
        }

        .history::-webkit-scrollbar-track {
            background: var(--surface-color);
        }

        .history::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .history::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .rating-table-wrapper {
            margin-top: 15px;
            margin-bottom: 25px;
            width: 100%;
            overflow-x: auto;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .rating-table-wrapper.show {
            display: block;
        }

        .rating-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            table-layout: fixed;
        }

        .rating-table th,
        .rating-table td {
            border: 1px solid var(--border-color);
            padding: 6px 2px;
            text-align: center;
        }

        .rating-table th {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--text-color);
            font-weight: 600;
        }

        .rating-table td {
            color: var(--accent);
            font-weight: bold;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .power-input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .power-input-group.active {
            opacity: 1;
        }

        .power-input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1.1rem;
            width: 80px;
            text-align: center;
        }

        .power-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .weapon-inputs-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 0.6fr 1.4fr;
            gap: 10px;
            margin-bottom: 10px;
            width: 100%;
        }

        .weapon-inputs-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }

        .weapon-input-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .weapon-label {
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: #94a3b8;
        }

        .round-tracker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .round-label {
            font-weight: bold;
            color: var(--text-color);
            margin-right: -5px;
        }

        .buff-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }

        .buff-item {
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px;
            gap: 5px;
        }

        .buff-name {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 0.9rem;
            padding: 5px;
            outline: none;
            min-width: 50px;
            /* スマホで縮小できるように追加 */
        }

        .buff-target {
            max-width: 110px;
            /* スマホで長くなりすぎないように制限 */
            text-overflow: ellipsis;
        }

        .buff-name::placeholder {
            color: #64748b;
        }

        .buff-value,
        .buff-duration {
            width: 45px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            padding: 4px;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }

        .buff-duration {
            width: 50px;
            color: #fbbf24;
            /* highlight for duration */
        }

        .buff-value:focus,
        .buff-duration:focus,
        .buff-name:focus {
            border-color: var(--primary);
        }

        /* 能力値・技能セクションのスタイル */
        .status-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: auto auto 1fr 1fr;
            gap: 8px;
            align-items: center;
        }

        .stats-label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: bold;
        }

        .stats-input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            padding: 4px;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .skill-item {
            display: grid;
            grid-template-columns: auto 1fr 45px;
            gap: 5px;
            align-items: center;
        }

        .skill-name {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.9rem;
        }

        .skill-level {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--accent);
            border-radius: 4px;
            padding: 4px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: bold;
        }

        /* 判定用選択スタイル */
        .clickable-stat,
        .clickable-skill {
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            padding: 4px;
            text-align: center;
            user-select: none;
            width: 24px;
            height: 24px;
            line-height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
        }

        .clickable-stat:hover,
        .clickable-skill:hover {
            background-color: rgba(99, 102, 241, 0.2);
            transform: scale(1.1);
        }

        .selected-item {
            background-color: var(--primary) !important;
            color: white !important;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .file-input-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .file-label {
            background-color: var(--surface-color);
            border: 1px dashed var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-label:hover {
            background-color: rgba(99, 102, 241, 0.1);
            border-style: solid;
        }

        #json-upload {
            display: none;
        }

        /* レスポンシブ対応 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 10px;
            }

            .status-container {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .buff-container {
                grid-template-columns: 1fr;
            }

            .buff-target {
                max-width: 85px;
                /* スマホ時はさらに小さく */
                font-size: 0.85rem;
            }

            .buff-name {
                min-width: 0;
                /* プレースホルダーによる拡張防止 */
                width: 50px;
                /* フレックスで伸びるがベース幅を小さく指定 */
                font-size: 0.8rem;
                padding: 4px 2px;
            }

            .buff-name::placeholder {
                font-size: 0.75rem;
                content: "名前";
                /* プレースホルダーを短く見せることはCSSだけでは難しいが、はみ出し防止にはなる */
            }

            .buff-value,
            .buff-duration {
                width: 35px;
                /* さらに縮小 */
                padding: 4px 1px;
                font-size: 0.8rem;
            }

            .buff-item {
                gap: 2px;
                /* アイテム間の隙間を詰める */
                padding: 4px 2px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .total-score {
                font-size: 1.5rem !important;
            }
        }

        /* アコーディオン（武器・魔法セット）のスタイル */
        .accordion-item {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            width: 100%;
            text-align: left;
        }

        .accordion-header {
            padding: 12px 18px;
            background-color: rgba(99, 102, 241, 0.1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-color);
            border-bottom: 1px solid transparent;
        }

        .accordion-header:hover {
            background-color: rgba(99, 102, 241, 0.2);
        }

        .accordion-header::after {
            content: '▼';
            font-size: 0.7rem;
            transition: transform 0.3s;
            color: var(--primary);
        }

        .accordion-item.collapsed .accordion-header::after {
            transform: rotate(-90deg);
        }

        .accordion-item:not(.collapsed) .accordion-header {
            border-bottom-color: var(--border-color);
            background-color: rgba(99, 102, 241, 0.15);
        }

        .accordion-content {
            padding: 15px;
            display: block;
        }

        .accordion-item.collapsed .accordion-content {
            display: none;
        }

        .weapon-title-tag {
            font-size: 0.8rem;
            font-weight: normal;
            color: var(--accent);
            margin-left: 10px;
            border: 1px solid var(--accent);
            padding: 1px 6px;
            border-radius: 4px;
        }

        /* 威力算出ボタンのスタイル */
        .power-input-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 100%;
        }

        .calc-btn {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
            padding: 0;
            flex-shrink: 0;
        }

        .calc-btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .calc-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>SW２.５ダイスローラー</h1>

        <div class="pc-name-container">
            <input type="text" id="pc-name" class="pc-name-input" placeholder="キャラクター名を入力">
        </div>

        <div class="setting-section">
            <div class="setting-title">🔄 ラウンド同期設定 (Firebase)</div>
            <div class="webhook-input-group">
                <label style="font-size: 0.85rem;">ルームID（同じIDの人と同期します）</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="room-id" class="webhook-url-input" placeholder="例: room-alpha-123"
                        style="flex: 1;">
                </div>

                <div class="webhook-controls">
                    <label class="checkbox-container">
                        <input type="checkbox" id="gm-mode-enable" style="cursor: pointer; width: 16px; height: 16px;">
                        <span style="color: #fbbf24; font-weight: bold;">GMモード (ラウンド数を操作＆送信)</span>
                    </label>
                </div>
                <div id="sync-status" style="font-size: 0.75rem; color: #94a3b8; text-align: right; margin-top: 4px;">
                    未接続</div>
            </div>
        </div>

        <div class="setting-section">
            <div class="setting-title">
                <span>🔗 Discord連携設定</span>
            </div>
            <div class="webhook-input-group">
                <input type="password" id="webhook-url" class="webhook-url-input" placeholder="Webhook URLを入力">
                <div class="webhook-controls">
                    <label class="checkbox-container">
                        <input type="checkbox" id="webhook-enable"> Discordに送信する
                    </label>
                    <span id="webhook-status" style="font-size: 0.75rem; color: #94a3b8;"></span>
                </div>
            </div>
        </div>

        <div class="file-input-wrapper">
            <label for="json-upload" class="file-label">
                <span>📁 キャラクターJSONを読み込む</span>
                <input type="file" id="json-upload" accept=".json">
            </label>
            <button id="json-download" class="file-label"
                style="margin-left: 10px; border: 1px solid var(--accent); color: var(--accent); background: transparent; cursor: pointer;">
                <span>💾 現在の状態をJSONで保存</span>
            </button>
        </div>

        <div class="controls">
            <button id="decrease-btn" class="control-btn" aria-label="ダイスを減らす">−</button>
            <div id="dice-count" class="dice-count-display">2d6</div>
            <button id="increase-btn" class="control-btn" aria-label="ダイスを増やす">＋</button>
        </div>

        <div class="round-tracker">
            <span class="round-label">ラウンド</span>
            <button id="round-decrease" class="control-btn" aria-label="ラウンドを減らす"
                style="width:35px; height:35px; font-size:1rem;">−</button>
            <div id="round-display" class="dice-count-display"

        firebase.initializeApp(firebaseConfig);

        document.addEventListener('DOMContentLoaded', () => {
            const decreaseBtn = document.getElementById('decrease-btn');

            const webhookUrlInput = document.getElementById('webhook-url');
            const webhookEnableCheckbox = document.getElementById('webhook-enable');
            const webhookStatus = document.getElementById('webhook-status');

            // 回避判定用要素
            const evasionAgiB = document.getElementById('evasion-agi-b');
            const evasionSkillSelect = document.getElementById('evasion-skill-select');
            const evasionEquip = document.getElementById('evasion-equip');
            const evasionTotal = document.getElementById('evasion-total');
            const bonusAgi = document.getElementById('bonus-agi');
            const rollEvasionBtn = document.getElementById('roll-evasion-btn');

            // バフ集計ヘルパー関数
            function calculateTotalBuff(targetType = 'all') {
                const buffItems = document.querySelectorAll('.buff-item');
                let total = 0;
                buffItems.forEach(item => {
                    const chk = item.querySelector('.buff-active-chk');
                    if (chk && !chk.checked) return; // チェックOFFなら無視

                    const tSelect = item.querySelector('.buff-target');
                    const vInput = item.querySelector('.buff-value');
                    const tVal = tSelect ? tSelect.value : 'all';
                    const val = parseInt(vInput ? vInput.value : 0, 10);
                    if (!isNaN(val) && (tVal === 'all' || tVal === targetType)) {
                        total += val;
                    }
                });
                return total;
            }

            // バフテキスト取得ヘルパー関数（Discord受信用）
            function getActiveBuffTexts(targetType = 'all') {
                const buffItems = document.querySelectorAll('.buff-item');
                let activeBuffs = [];
                buffItems.forEach(item => {
                    const chk = item.querySelector('.buff-active-chk');
                    if (chk && !chk.checked) return; // チェックOFFなら無視

                    const tSelect = item.querySelector('.buff-target');
                    const nameInput = item.querySelector('.buff-name');
                    const vInput = item.querySelector('.buff-value');
                    const durInput = item.querySelector('.buff-duration');
                    const tVal = tSelect ? tSelect.value : 'all';

                    if (tVal === 'all' || tVal === targetType) {
                        const name = nameInput ? nameInput.value : '';
                        const val = vInput ? vInput.value : '';
                        const dur = durInput ? durInput.value : '';
                        if (name && val) {
                            activeBuffs.push(`${name}(${val > 0 ? '+' : ''}${val}) [残${dur}R]`);
                        }
                    }
                });
                return activeBuffs;
            }

            function updateEvasionTotal() {
                const agiB = parseInt(bonusAgi.value, 10) || 0;
                const skillLv = evasionSkillSelect ? parseInt(evasionSkillSelect.value, 10) || 0 : 0;
                const equip = parseInt(evasionEquip.value, 10) || 0;
                const buff = calculateTotalBuff('dodge');
                if (evasionAgiB) evasionAgiB.value = agiB;
                if (evasionTotal) evasionTotal.textContent = agiB + skillLv + equip + buff;
            }

            window.populateEvasionSkillSelect = function () {
                if (!evasionSkillSelect) return;
                const selectedOpt = evasionSkillSelect.options[evasionSkillSelect.selectedIndex];
                const currentText = selectedOpt && selectedOpt.dataset ? selectedOpt.dataset.name : '';

                evasionSkillSelect.innerHTML = '<option value="0" data-name="なし">なし (0)</option>';
                for (let i = 1; i <= 5; i++) {
                    const nameEl = document.getElementById(`skill-name-${i}`);
                    const lvEl = document.getElementById(`skill-lv-${i}`);
                    const sName = nameEl ? nameEl.value : '';
                    const sLv = lvEl ? lvEl.value : '';
                    if (sName) {
                        const option = document.createElement('option');
                        option.value = sLv || 0;
                        option.dataset.name = sName;
                        option.textContent = `${sName} (${sLv || 0})`;
                        evasionSkillSelect.appendChild(option);
                    }
                }

                // 選択状態の復元
                if (currentText && currentText !== 'なし') {
                    for (let i = 0; i < evasionSkillSelect.options.length; i++) {
                        if (evasionSkillSelect.options[i].dataset.name === currentText) {
                            evasionSkillSelect.selectedIndex = i;
                            break;
                        }
                    }
                }
                updateEvasionTotal();
            };

            // 技能・敏捷B・装備の変更検知、およびバフの変更時にも回避判定の再計算を行う
            if (bonusAgi && evasionEquip && evasionSkillSelect) {
                [bonusAgi, evasionEquip].forEach(el => {
                    el.addEventListener('input', updateEvasionTotal);
                    el.addEventListener('change', updateEvasionTotal);
                });
                evasionSkillSelect.addEventListener('change', updateEvasionTotal);
            }
            document.querySelectorAll('.buff-target, .buff-value').forEach(el => {
                el.addEventListener('input', updateEvasionTotal);
                el.addEventListener('change', updateEvasionTotal);
            });

            for (let i = 1; i <= 5; i++) {
                const sNameEl = document.getElementById(`skill-name-${i}`);
                const sLvEl = document.getElementById(`skill-lv-${i}`);
                if (sNameEl) {
                    sNameEl.addEventListener('input', window.populateEvasionSkillSelect);
                    sNameEl.addEventListener('change', window.populateEvasionSkillSelect);
                }
                if (sLvEl) {
                    sLvEl.addEventListener('input', window.populateEvasionSkillSelect);
                    sLvEl.addEventListener('change', window.populateEvasionSkillSelect);
                }
            }

            if (rollEvasionBtn) {
                rollEvasionBtn.addEventListener('click', () => {
                    const selectedOpt = evasionSkillSelect ? evasionSkillSelect.options[evasionSkillSelect.selectedIndex] : null;
                    const sName = (selectedOpt && selectedOpt.dataset) ? (selectedOpt.dataset.name || '回避') : '回避';
                    const agiB = parseInt(bonusAgi.value, 10) || 0;
                    const skillLv = evasionSkillSelect ? parseInt(evasionSkillSelect.value, 10) || 0 : 0;
                    const equip = parseInt(evasionEquip.value, 10) || 0;
                    const baseEvasion = agiB + skillLv + equip;
                    rollCheck('回避', sName, baseEvasion);
                });
            }

            // 初期表示で回避プルダウンを生成
            if (typeof window.populateEvasionSkillSelect === 'function') {
                window.populateEvasionSkillSelect();
            }

            let lastRollData = null;

            // 設定の読み込み
            pcNameInput.value = localStorage.getItem('sw25_pc_name') || '';
            webhookUrlInput.value = localStorage.getItem('sw25_webhook_url') || '';
            webhookEnableCheckbox.checked = localStorage.getItem('sw25_webhook_enable') === 'true';

            // Firebase設定の読み込みとUI
            const roomIdInput = document.getElementById('room-id');
            const gmModeCheckbox = document.getElementById('gm-mode-enable');
            const syncStatus = document.getElementById('sync-status');

            roomIdInput.value = localStorage.getItem('sw25_room_id') || '';
            gmModeCheckbox.checked = localStorage.getItem('sw25_gm_mode') === 'true';

            let roundRef = null;
            let currentFBRound = 1;

            function setupFirebaseSync() {
                // 古いリスナーがあれば解除
                if (roundRef) {
                    roundRef.off();
                }

                const roomId = roomIdInput.value.trim();
                if (!roomId) {
                    syncStatus.textContent = "未接続（ルームIDを入力してください）";
                    syncStatus.style.color = "#94a3b8";
                    return;
                }

                roundRef = db.ref(`rooms/${roomId}/round`);
                syncStatus.textContent = "接続済み";
                syncStatus.style.color = "var(--accent)";

                // ラウンド変更のリスナー
                roundRef.on('value', (snapshot) => {
                    const newRound = snapshot.val();
                    if (newRound !== null) {
                        currentFBRound = newRound;
                        roundDisplay.textContent = newRound;

                        // DBと同期した場合に、状態も更新する
                        if (round !== newRound) {
                            // 新しいラウンドになったときだけバフ等の処理をする場合
                            round = newRound;
                            roundDecreaseBtn.disabled = round <= 1;
                        }
                    }
                }, (error) => {
                    console.error("Firebase sync error:", error);
                    syncStatus.textContent = "接続エラー";
                    syncStatus.style.color = "#ef4444";
                });
            }

            roomIdInput.addEventListener('change', () => {
                saveSettings();
                setupFirebaseSync();
            });
            gmModeCheckbox.addEventListener('change', () => {
                saveSettings();
                // GMモードになったら、即座に現在のラウンドを送信
                if (gmModeCheckbox.checked && roomIdInput.value.trim()) {
                    db.ref(`rooms/${roomIdInput.value.trim()}/round`).set(round);
                }
            });

            // 初期化
            setupFirebaseSync();

            // 設定の保存
            const saveSettings = () => {
                localStorage.setItem('sw25_pc_name', pcNameInput.value);
                localStorage.setItem('sw25_webhook_url', webhookUrlInput.value);
                localStorage.setItem('sw25_webhook_enable', webhookEnableCheckbox.checked);
                localStorage.setItem('sw25_room_id', roomIdInput.value);
                localStorage.setItem('sw25_gm_mode', gmModeCheckbox.checked);
            };

            pcNameInput.addEventListener('change', saveSettings);
            webhookUrlInput.addEventListener('change', saveSettings);
            webhookEnableCheckbox.addEventListener('change', saveSettings);

            // Discord送信関数
            async function sendToDiscord(rollData) {
                if (!webhookEnableCheckbox.checked || !webhookUrlInput.value) return;

                const pcName = pcNameInput.value || '冒険者';
                const round = roundDisplay.textContent;

                // バフ情報の取得
                // バフ情報の取得
                const activeBuffs = getActiveBuffTexts(rollData.targetType || 'all');

                const content = {
                    username: pcName,
                    embeds: [{
                        title: rollData.isFate ? `【運命変転】 ${rollData.title}` : rollData.title,
                        description: `**結果: ${rollData.displayTotal}**\n${rollData.historyRolls}`,
                        color: rollData.isFate ? 0x10b981 : (rollData.isAutoFail ? 0xef4444 : 0x6366f1),
                        fields: [
                            { name: "ラウンド", value: `${round}R`, inline: true }
                        ],
                        footer: { text: "SW2.5 ダイスローラー" },
                        timestamp: new Date().toISOString()
                    }]
                };

                if (activeBuffs.length > 0) {
                    content.embeds[0].fields.push({ name: "適用中のバフ", value: activeBuffs.join('\n'), inline: false });
                }

                try {
                    const response = await fetch(webhookUrlInput.value, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(content)
                    });
                    if (response.ok) {
                        webhookStatus.textContent = '送信完了';
                        webhookStatus.style.color = '#10b981';
                    } else {
                        webhookStatus.textContent = '送信失敗';
                        webhookStatus.style.color = '#ef4444';
                    }
                } catch (err) {
                    webhookStatus.textContent = '通信エラー';
                    webhookStatus.style.color = '#ef4444';
                }
                setTimeout(() => { webhookStatus.textContent = ''; }, 3000);
            }

            // アコーディオン開閉制御
            window.toggleAccordion = function (id) {
                const item = document.getElementById(id);
                const isCollapsed = item.classList.contains('collapsed');

                // 武器セットの場合は他の武器セットを閉じる（任意。今回は個別に開閉可能とする）
                // item.classList.toggle('collapsed');

                if (isCollapsed) {
                    item.classList.remove('collapsed');
                } else {
                    item.classList.add('collapsed');
                }
            };

            // 技能マッピング
            const skillMap = {
                'Fig': 'ファイター', 'Gra': 'グラップラー', 'Fen': 'フェンサー', 'Sho': 'シューター',
                'Sor': 'ソーサラー', 'Con': 'コンジャラー', 'Pri': 'プリースト', 'Mag': 'マギテック',
                'Fai': 'フェアリーテイマー', 'Dru': 'ドルイド', 'Dem': 'デーモンルーラー', 'Sco': 'スカウト',
                'Ran': 'レンジャー', 'Sag': 'セージ', 'Rid': 'ライダー', 'Alc': 'アルケミスト',
                'Bar': 'バード', 'War': 'ウォーリーダー', 'Mys': 'ミスティック', 'Art': 'アーティザン',
                'Ari': 'アリストクラシー', 'Sch': 'スカラー', 'Bib': 'ビブリオマンサー', 'Dar': 'ダークハンター',
                'Abys': 'アビスゲイザー', 'Aby': 'アビスゲイザー', 'Sha': 'シャドウウィッチ', 'Phy': 'フィジカルマスター',
                'Gri': 'グリモワール', 'Enh': 'エンハンサー', 'Neu': 'シューター', 'Bat': 'バトルダンサー', 'Geo': 'ジオマンサー'
            };

            // 除外すべきシステム項目
            const excludeList = ['lvCaster', 'lvCommon', 'lvMagic'];

            // JSON 読み込み機能
            jsonUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 読み込み前に各フィールドをリセット
                const fieldsToReset = [
                    'stt-dex', 'bonus-dex', 'stt-agi', 'bonus-agi', 'stt-str', 'bonus-str',
                    'stt-vit', 'bonus-vit', 'stt-int', 'bonus-int', 'stt-mnd', 'bonus-mnd'
                ];
                fieldsToReset.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });

                for (let i = 1; i <= 5; i++) {
                    const nameEl = document.getElementById(`skill-name-${i}`);
                    const lvEl = document.getElementById(`skill-lv-${i}`);
                    if (nameEl) nameEl.value = '';
                    if (lvEl) lvEl.value = '';
                }

                const weaponFields = ['magic-power-input', 'magic-crit-input', 'magic-bonus-input'];
                // 武器1-4のフィールドをリセット
                for (let i = 1; i <= 4; i++) {
                    ['name', 'usage', 'reqd', 'hit', 'power', 'crit', 'extra-dmg'].forEach(suffix => {
                        const el = document.getElementById(`weapon-${i}-${suffix}`);
                        if (el) {
                            if (suffix === 'crit') el.value = '10';
                            else el.value = '';
                        }
                    });
                    const tag = document.getElementById(`weapon-${i}-tag`);
                    if (tag) {

            function rollDice(arg, fixedDice = null) {
                const isFate = (fixedDice !== null);
                // 引数が文字列でない（Eventオブジェクトなど）場合はデフォルトの判定を行う

                // ダイス生成

                    const die = document.createElement('div');
                    die.className = 'die show rolling';
                    die.textContent = Math.floor(Math.random() * 6) + 1;
                    diceContainer.appendChild(die);
                    diceElements.push(die);
                }

                // 2d6の威力計算用再帰関数
                function calculateDamage(power, crit, currentDmg, rollCnt, details, extraDice = [], originalLabel = '') {
                    if (typeof damageTable === 'undefined' || !damageTable[power]) return { damage: currentDmg, isAutoFail: false, rolls: details, extraDice };

                    const d1 = Math.floor(Math.random() * 6) + 1;
                    const d2 = Math.floor(Math.random() * 6) + 1;
                    const rollTotal = d1 + d2;
                    let newDmg = 0;

                    details.push(`${d1},${d2}(=${rollTotal})`);
                    extraDice.push(d1, d2);

                    // 振り足しでの2は自動失敗ではないが、威力表の計算は必要
                    if (rollTotal > 2) {
                        newDmg = damageTable[power][rollTotal - 3] || 0;
                    }

                    const accumulated = currentDmg + newDmg;

                    if (rollTotal >= crit && rollTotal > 2) {
                        details[details.length - 1] += ' クリ!';
                        let nextPower = power;
                        if (originalLabel.includes('首斬り刀')) {
                            nextPower = Math.min(100, nextPower + 5);
                        }
                        return calculateDamage(nextPower, crit, accumulated, rollCnt + 1, details, extraDice, originalLabel);
                    } else {
                        return { damage: accumulated, isAutoFail: false, rolls: details, extraDice };
                    }
                }

                // アニメーション後の処理
                setTimeout(() => {
                    for (let i = 0; i < diceCount; i++) {
                        const res = isFate ? fixedDice[i] : Math.floor(Math.random() * 6) + 1;
                        results.push(res);
                        total += res;
                        diceElements[i].className = 'die show' + (isFate ? ' fate' : '');
                        diceElements[i].textContent = res;
                    }

                    const isDiceOnly = document.getElementById('dice-only-checkbox') && document.getElementById('dice-only-checkbox').checked;

                    let finalResultText = `合計: ${total}`;

                    let isDamageRollApplied = false;

                    // 出目のみ出力ONの場合は威力計算などをすべてスキップ
                    if (isDiceOnly) {

                        displayTotalStr = total.toString();

                    }
                    // 威力計算が必要な場合（出目のみ出力がOFFで2d6のとき）
                    else if (diceCount === 2) {

                        let inputVal = '';

                            const pEl = document.getElementById('magic-power-input');

                                power = parseInt(inputVal, 10);
                                critValue = parseInt(cEl.value, 10) || 10;
                                if (document.getElementById('magic-no-crit').checked) critValue = 13;
                                extraDmg = parseInt(bEl.value, 10) || 0;
                                label = '魔法';
                            }
                        } else if (type.startsWith('weapon-')) {

                            const pEl = document.getElementById(`weapon-${idx}-power`);
                            const cEl = document.getElementById(`weapon-${idx}-crit`);
                            const nEl = document.getElementById(`weapon-${idx}-name`);
                            const eEl = document.getElementById(`weapon-${idx}-extra-dmg`);
                            if (pEl && pEl.value !== '') {
                                inputVal = pEl.value;
                                power = parseInt(inputVal, 10);
                                critValue = parseInt(cEl.value, 10) || 10;
                                extraDmg = parseInt(eEl.value, 10) || 0;
                                label = nEl.value || `武器${idx}`;
                            }
                        }

                        // 威力データがあり、かつdamageTableがロードされている場合のみダメージ計算実行
                        if (inputVal !== '' && !isNaN(power) && typeof damageTable !== 'undefined' && damageTable[power]) {
                            isDamageRollApplied = true;
                            const firstD1 = results[0];
                            const firstD2 = results[1];
                            const firstTotal = firstD1 + firstD2;
                            let rollDetails = [`${firstD1},${firstD2}(=${firstTotal})`];

                            if (firstTotal === 2) {
                                finalResultText = `自動失敗 (出目2)`;
                                isAutoFail = true;
                                displayTotalStr = '自動失敗';
                                historyRollsStr = rollDetails[0];
                            } else {
                                let initialDmg = damageTable[power][firstTotal - 3] || 0;
                                const combinedBonus = totalBuff + extraDmg;
                                const modifierText = combinedBonus > 0 ? `+${combinedBonus}` : (combinedBonus < 0 ? `${combinedBonus}` : '');

                                if (firstTotal >= critValue) {
                                    rollDetails[0] += ' クリ!';
                                    let nextPower = power;
                                    if (label.includes('首斬り刀')) {
                                        nextPower = Math.min(100, nextPower + 5);
                                    }
                                    const critRes = calculateDamage(nextPower, critValue, initialDmg, 1, rollDetails, [], label);
                                    let finalDmgVal = (typeof critRes.damage === 'number') ? critRes.damage + combinedBonus : critRes.damage;

                                    // 振足しダイス表示
                                    if (critRes.extraDice && critRes.extraDice.length > 0) {
                                        const plus = document.createElement('div');
                                        plus.textContent = '＋';
                                        plus.className = 'die show';
                                        plus.style.background = 'none';
                                        plus.style.boxShadow = 'none';
                                        plus.style.fontSize = '1.5rem';
                                        plus.style.color = 'var(--accent)';
                                        plus.style.display = 'flex';
                                        plus.style.alignItems = 'center';
                                        plus.style.margin = '0 10px';
                                        diceContainer.appendChild(plus);
                                        critRes.extraDice.forEach(v => {
                                            const d = document.createElement('div');
                                            d.className = 'die show';
                                            d.textContent = v;
                                            diceContainer.appendChild(d);
                                        });
                                    }
                                    finalResultText = `${label}ダメージ: ${finalDmgVal} (威力${power}, クリ${critValue}${modifierText})`;
                                    displayTotalStr = finalDmgVal.toString();
                                    historyRollsStr = critRes.rolls.join(' ＞ ') + (modifierText ? ` 修正${modifierText}` : '');
                                } else {
                                    const finalDmgVal = initialDmg + combinedBonus;
                                    finalResultText = `${label}ダメージ: ${finalDmgVal} (出目${firstTotal}, 威力${power}${modifierText})`;
                                    displayTotalStr = finalDmgVal.toString();
                                    historyRollsStr = rollDetails[0] + (modifierText ? ` 修正${modifierText}` : '');
                                }
                            }
                        }
                    }

                    // 威力判定でない、または計算されなかった場合（出目のみの場合はここを通るがtotalBuffは加算しないよう制御）
                    if (!isDamageRollApplied && !isDiceOnly) {
                        total += totalBuff;
                        const buffText = totalBuff > 0 ? `+${totalBuff}` : (totalBuff < 0 ? `${totalBuff}` : '');
                        finalResultText = `合計: ${total}${buffText ? ' (バフ' + buffText + ')' : ''}`;
                        historyRollsStr += (buffText ? ` バフ${buffText}` : '');
                        displayTotalStr = total.toString();
                    }

                    // 結果表示
                    totalScoreDisplay.textContent = (isFate ? '【運命変転】' : '') + finalResultText;
                    totalScoreDisplay.className = 'total-score show';
                    totalScoreDisplay.style.color = isFate ? '#10b981' : ((isAutoFail && !isDiceOnly) ? '#ef4444' : 'var(--accent)');
                    totalScoreDisplay.style.fontSize = (isAutoFail && !isDiceOnly) ? '2rem' : '1.8rem';

                    const rollResultData = {
                        isFate: isFate,
                        title: isDiceOnly ? "ダイスロール" : (isDamageRollApplied ? finalResultText : "判定"),
                        displayTotal: displayTotalStr,
                        historyRolls: historyRollsStr,
                        isAutoFail: isDiceOnly ? false : isAutoFail
                    };

                    addToHistory(diceCount, historyRollsStr, displayTotalStr, isAutoFail);
                    sendToDiscord(rollResultData);
                    rollBtn.disabled = false;
                    rollBtn.textContent = 'ダイスを振る';

                    // 2d6ロールの場合のみ運命変転データを保存
                    if (results.length === 2 && !isFate) {
                        lastRollData = {
                            type: 'damage',
                            rollType: type,
                            dice: [...results],
                            diceCount: diceCount
                        };
                        fateBtn.disabled = false;
                    } else {
                        fateBtn.disabled = true;
                    }
                }, 600);
            }

            // 運命変転の実行
            fateBtn.addEventListener('click', () => {
                if (!lastRollData) return;

                const flippedDice = lastRollData.dice.map(v => 7 - v);
                const isFate = true;

                if (lastRollData.type === 'damage') {
                    rollDice(lastRollData.rollType, flippedDice);
                } else if (lastRollData.type === 'hit') {
                    rollHitCheck(lastRollData.label, lastRollData.base, flippedDice);
                } else if (lastRollData.type === 'check') {
                    rollCheck(lastRollData.stat, lastRollData.skill, lastRollData.base, flippedDice);
                }

                fateBtn.disabled = true;
            });

            rollBtn.addEventListener('click', () => rollDice());

            function addToHistory(count, rollsStr, totalStr, isAutoFail = false) {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';

                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

                const colorStyle = isAutoFail ? 'color: #ef4444;' : 'color: var(--text-color);';

                historyItem.innerHTML = `
                    <span>[${timeString}] ${count}d6 ＞ [${rollsStr}]</span>
                    <strong style="${colorStyle}">→ ${totalStr}</strong>
                `;

                historyContainer.insertBefore(historyItem, historyContainer.firstChild);

                // Keep only last 10 items
                if (historyContainer.children.length > 10) {
                    historyContainer.removeChild(historyContainer.lastChild);
                }
            }

            // 命中判定・威力判定クリックイベント（動的に割り当て）
            document.querySelectorAll('.weapon-hit-label, .weapon-hit-calc-btn').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const idx = el.getAttribute('data-index');
                    const hitBase = parseInt(document.getElementById(`weapon-${idx}-hit`).value, 10) || 0;
                    const weaponName = document.getElementById(`weapon-${idx}-name`).value || `武器${idx}`;
                    rollHitCheck(weaponName, hitBase);
                });
            });

            document.querySelectorAll('.weapon-power-label, .weapon-calc-btn').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const idx = el.getAttribute('data-index');
                    const powerVal = document.getElementById(`weapon-${idx}-power`).value;
                    if (powerVal === '' || isNaN(parseInt(powerVal, 10))) {
                        alert('威力を入力してください。');
                        return;
                    }
                    // ダイス数を2d6にセット
                    diceCount = 2;
                    updateDiceCountDisplay(`weapon`, idx);
                    // ダメージロール実行
                    rollDice(`weapon-${idx}`);
                });
            });

            const magicTriggerIds = ['magic-power-label', 'magic-calc-btn'];
            magicTriggerIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const powerVal = document.getElementById('magic-power-input').value;
                        if (powerVal === '' || isNaN(parseInt(powerVal, 10))) {
                            alert('魔法威力を入力してください。');
                            return;
                        }
                        // ダイス数を2d6にセット
                        diceCount = 2;
                        updateDiceCountDisplay('magic');
                        // ダメージロール実行
                        rollDice('magic');
                    });
                }
            });

            // 魔法行使判定クリックイベント
            const magicCastBtn = document.getElementById('magic-cast-btn');
            if (magicCastBtn) {
                magicCastBtn.addEventListener('click', () => {
                    const magicBonusInput = document.getElementById('magic-bonus-input');
                    const magicPower = parseInt(magicBonusInput.value, 10) || 0;
                    rollCheck('魔法行使', '知力', magicPower);
                });
            }

            function rollHitCheck(weaponName, hitBase, fixedDice = null) {
                const isFate = (fixedDice !== null);
                rollBtn.disabled = true;
                rollBtn.textContent = '判定中...';
                fateBtn.disabled = true;

                // Calculate total buffs/debuffs
                const totalBuff = calculateTotalBuff('hit');

                diceContainer.innerHTML = '';
                totalScoreDisplay.className = 'total-score';
                totalScoreDisplay.textContent = '';

                const d1 = isFate ? fixedDice[0] : Math.floor(Math.random() * 6) + 1;
                const d2 = isFate ? fixedDice[1] : Math.floor(Math.random() * 6) + 1;
                const diceTotal = d1 + d2;

                [d1, d2].forEach(val => {
                    const die = document.createElement('div');
                    die.className = 'die show rolling';
                    die.textContent = val;
                    diceContainer.appendChild(die);
                });

                setTimeout(() => {
                    document.querySelectorAll('.die').forEach(el => el.classList.remove('rolling'));

                    const isDiceOnly = document.getElementById('dice-only-checkbox') && document.getElementById('dice-only-checkbox').checked;

                    let isAutoFail = (diceTotal === 2);
                    let isAutoSuccess = (diceTotal === 12);

                    let finalResult, resultText, detailStr, rollTitle, textColor;

                    if (isDiceOnly) {
                        finalResult = diceTotal;
                        resultText = diceTotal;
                        detailStr = `${diceTotal}[${d1},${d2}]`;
                        rollTitle = "ダイスロール";
                        textColor = 'var(--text-color)';
                        isAutoFail = false;
                        isAutoSuccess = false;
                    } else {
                        finalResult = isAutoFail ? 0 : diceTotal + hitBase + totalBuff;
                        resultText = isAutoFail ? '自動失敗' : (isAutoSuccess ? `自動成功 (${finalResult})` : finalResult);
                        detailStr = `${diceTotal}[${d1},${d2}] + ${hitBase}`;
                        if (totalBuff !== 0) detailStr += (totalBuff > 0 ? ` + ${totalBuff}` : ` - ${Math.abs(totalBuff)}`);
                        rollTitle = `${weaponName}命中判定`;
                        textColor = isAutoFail ? '#ef4444' : (isAutoSuccess ? '#fbbf24' : 'var(--accent)');
                    }

                    totalScoreDisplay.textContent = (isFate ? '【運命変転】' : '') + (isDiceOnly ? `出目合計: ${resultText}` : `${rollTitle}: ${resultText}`);
                    totalScoreDisplay.style.color = isFate ? '#10b981' : textColor;
                    totalScoreDisplay.style.fontSize = '1.5rem';
                    totalScoreDisplay.className = 'total-score show';

                    const rollResultData = {
                        isFate: isFate,
                        title: rollTitle,
                        displayTotal: resultText,
                        historyRolls: detailStr,
                        isAutoFail: isAutoFail,
                        targetType: isDiceOnly ? 'none' : 'hit'
                    };

                    addToHistory(2, (isFate ? '運命変転:' : '') + (isDiceOnly ? detailStr : `${weaponName}命中 ${detailStr}`), resultText, isAutoFail);
                    sendToDiscord(rollResultData);

                    rollBtn.disabled = false;
                    rollBtn.textContent = 'ダイスを振る';

                    if (!isFate) {
                        lastRollData = {
                            type: 'hit',
                            label: weaponName,
                            base: hitBase,
                            dice: [d1, d2]
                        };
                        fateBtn.disabled = false;
                    } else {
                        fateBtn.disabled = true;
                    }
                }, 600);
            }

            // 判定機能の変数
            let selectedStat = null;
            let selectedSkill = null;

            // 能力値クリックイベント
            document.querySelectorAll('.clickable-stat').forEach(el => {
                el.addEventListener('click', () => {
                    if (selectedStat === el) {
                        el.classList.remove('selected-item');
                        selectedStat = null;
                    } else {
                        if (selectedStat) selectedStat.classList.remove('selected-item');
                        el.classList.add('selected-item');
                        selectedStat = el;
                        checkAndRollCheck();
                    }
                });
            });

            // 技能クリックイベント
            document.querySelectorAll('.clickable-skill').forEach(el => {
                el.addEventListener('click', (e) => {
                    // input欄がクリックされた場合は選択処理を行わない
                    if (e.target.tagName.toLowerCase() === 'input') return;

                    if (selectedSkill === el) {
                        el.classList.remove('selected-item');
                        selectedSkill = null;
                    } else {
                        if (selectedSkill) selectedSkill.classList.remove('selected-item');
                        el.classList.add('selected-item');
                        selectedSkill = el;
                        checkAndRollCheck();
                    }
                });
            });

            function checkAndRollCheck() {
                if (selectedStat && selectedSkill) {
                    const statKey = selectedStat.getAttribute('data-stat');
                    const bonusInput = document.getElementById(`bonus-${statKey}`);
                    const bonus = parseInt(bonusInput.value, 10) || 0;

                    const skillId = selectedSkill.getAttribute('data-skill-id');
                    const skillNameInput = document.getElementById(`skill-name-${skillId}`);
                    const skillLvInput = document.getElementById(`skill-lv-${skillId}`);
                    const skillName = skillNameInput.value || '技能なし';
                    const skillLv = parseInt(skillLvInput.value, 10) || 0;

                    const statNames = { dex: '器用度', agi: '敏捷度', str: '筋力', vit: '生命力', int: '知力', mnd: '精神力' };
                    const statName = statNames[statKey] || '能力値';
                    const baseMod = bonus + skillLv;

                    // 2d6ロールを実行
                    rollCheck(statName, skillName, baseMod);

                    // 選択を解除
                    selectedStat.classList.remove('selected-item');
                    selectedSkill.classList.remove('selected-item');
                    selectedStat = null;
                    selectedSkill = null;
                }
            }

            function rollCheck(statName, skillName, baseMod, fixedDice = null) {
                const isFate = (fixedDice !== null);
                rollBtn.disabled = true;
                rollBtn.textContent = '判定中...';
                fateBtn.disabled = true;

                // Calculate total buffs/debuffs
                let rollTargetType = 'all';
                if (statName.includes('回避')) rollTargetType = 'dodge';
                else if (statName.includes('生命力')) rollTargetType = 'vit';
                else if (statName.includes('知力') || statName.includes('魔法行使')) rollTargetType = 'int';
                else if (statName.includes('精神力')) rollTargetType = 'mnd';
                const totalBuff = calculateTotalBuff(rollTargetType);
                diceContainer.innerHTML = '';
                totalScoreDisplay.className = 'total-score';
                totalScoreDisplay.textContent = '';

                const d1 = isFate ? fixedDice[0] : Math.floor(Math.random() * 6) + 1;
                const d2 = isFate ? fixedDice[1] : Math.floor(Math.random() * 6) + 1;
                const diceTotal = d1 + d2;

                // アニメーション用のダイス表示
                [d1, d2].forEach(val => {
                    const die = document.createElement('div');
                    die.className = 'die show rolling';
                    die.textContent = val;
                    diceContainer.appendChild(die);
                });

                setTimeout(() => {
                    document.querySelectorAll('.die').forEach(el => el.classList.remove('rolling'));

                    const isDiceOnly = document.getElementById('dice-only-checkbox') && document.getElementById('dice-only-checkbox').checked;

                    let isAutoFail = (diceTotal === 2);
                    let finalResult, resultText, detailStr, rollTitle, textColor;

                    if (isDiceOnly) {
                        finalResult = diceTotal;
                        resultText = diceTotal;
                        detailStr = `${diceTotal}[${d1},${d2}]`;
                        rollTitle = "ダイスロール";
                        textColor = 'var(--text-color)';
                        isAutoFail = false;
                    } else {
                        finalResult = isAutoFail ? 0 : diceTotal + baseMod + totalBuff;
                        resultText = isAutoFail ? '自動失敗' : finalResult;
                        detailStr = `${diceTotal}[${d1},${d2}] + ${baseMod}`;
                        if (totalBuff !== 0) detailStr += (totalBuff > 0 ? ` + ${totalBuff}` : ` - ${Math.abs(totalBuff)}`);
                        rollTitle = `${statName}判定 (${skillName})`;
                        textColor = isAutoFail ? '#ef4444' : 'var(--accent)';
                    }

                    totalScoreDisplay.textContent = (isFate ? '【運命変転】' : '') + (isDiceOnly ? `出目合計: ${resultText}` : `${statName}/${skillName}判定: ${resultText}`);
                    totalScoreDisplay.style.color = isFate ? '#10b981' : textColor;
                    totalScoreDisplay.style.fontSize = '1.5rem';
                    totalScoreDisplay.className = 'total-score show';

                    const rollResultData = {
                        isFate: isFate,
                        title: rollTitle,
                        displayTotal: resultText,
                        historyRolls: isDiceOnly ? detailStr : `${diceTotal}[${d1},${d2}] + ${baseMod}`,
                        isAutoFail: isAutoFail,
                        targetType: isDiceOnly ? 'none' : rollTargetType,
                        totalBuff: isDiceOnly ? 0 : totalBuff
                    };

                    addToHistory(2, (isFate ? '運命変転:' : '') + (isDiceOnly ? detailStr : `${statName}/${skillName} ${detailStr}`), resultText, isAutoFail);
                    sendToDiscord(rollResultData);

                    rollBtn.disabled = false;
                    rollBtn.textContent = 'ダイスを振る';

                    if (!isFate) {
                        lastRollData = {
                            type: 'check',
                            stat: statName,
                            skill: skillName,
                            base: baseMod,
                            dice: [d1, d2]
                        };
                        fateBtn.disabled = false;
                    } else {
                        fateBtn.disabled = true;
                    }
                }, 600);
            }
        });
    </script>
</body>

</html>
